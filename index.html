<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Visor 3D</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
}
canvas{
display:block;
}
</style>

<script type="importmap">
{
"imports":{
"three":"https://unpkg.com/three@0.152.2/build/three.module.js",
"three/addons/":"https://unpkg.com/three@0.152.2/examples/jsm/"
}
}
</script>

</head>
<body>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm';

const scene = new THREE.Scene();
scene.background = new THREE.Color('#212121');

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
5000
);
camera.position.set(3,3,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera,renderer.domElement);
controls.enableDamping = true;

const ambientLight = new THREE.AmbientLight(0xffffff,0.45);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0xffffff,0x444444,1.2);
hemiLight.visible = false;
scene.add(hemiLight);

const dirLight = new THREE.DirectionalLight(0xffffff,0.55);
dirLight.position.set(5,10,7);
scene.add(dirLight);

const grid = new THREE.GridHelper(10,20);
scene.add(grid);

let currentModel = null;

const settings = {
fondo:'#212121',
rejilla:true,
wireframe:false,
luzAmbiente:true,
luzHemisferica:false,
luzDireccional:true
};

const gui = new GUI();

gui.addColor(settings,'fondo').name('Color fondo').onChange((value)=>{
scene.background = new THREE.Color(value);
});

gui.add(settings,'rejilla').name('Mostrar rejilla').onChange((value)=>{
grid.visible = value;
});

gui.add(settings,'wireframe').name('Wireframe').onChange((value)=>{
if(!currentModel) return;

currentModel.traverse((child)=>{
if(child.isMesh && child.material){
const materials = Array.isArray(child.material) ? child.material : [child.material];
materials.forEach((mat)=>{
mat.wireframe = value;
mat.needsUpdate = true;
});
}
});
});

gui.add(settings,'luzAmbiente').name('Luz ambiente').onChange((value)=>{
ambientLight.visible = value;
});

gui.add(settings,'luzHemisferica').name('Luz hemisférica').onChange((value)=>{
hemiLight.visible = value;
});

gui.add(settings,'luzDireccional').name('Luz direccional').onChange((value)=>{
dirLight.visible = value;
});

const loader = new GLTFLoader();

loader.load(
'modelo.glb',
function(gltf){

currentModel = gltf.scene;
scene.add(currentModel);

currentModel.traverse((child)=>{
if(child.isMesh && child.material){
const materials = Array.isArray(child.material) ? child.material : [child.material];

materials.forEach((mat)=>{
mat.wireframe = settings.wireframe;

if('metalness' in mat) mat.metalness = 0.05;
if('roughness' in mat) mat.roughness = 0.9;
if('envMapIntensity' in mat) mat.envMapIntensity = 0.2;

mat.needsUpdate = true;
});
}
});

const box = new THREE.Box3().setFromObject(currentModel);
const size = box.getSize(new THREE.Vector3());
const center = box.getCenter(new THREE.Vector3());

currentModel.position.sub(center);

const maxDim = Math.max(size.x,size.y,size.z);
const fov = camera.fov*(Math.PI/180);
let cameraZ = Math.abs(maxDim/2/Math.tan(fov/2));
cameraZ *= 2.2;

camera.position.set(0,maxDim*0.5,cameraZ);
camera.near = Math.max(0.1,maxDim/100);
camera.far = Math.max(1000,maxDim*100);
camera.updateProjectionMatrix();

controls.target.set(0,0,0);
controls.update();
},
undefined,
function(error){
console.error("Error cargando modelo:",error);
}
);

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
